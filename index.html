<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نوح - Portfolio</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .profile-top {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 20px;
    }

    .profile img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #4a90e2;
    }

    .profile-info h1 {
      margin: 0;
      font-size: 32px;
      color: #222;
    }

    .profile-info p {
      margin: 5px 0 0;
      font-size: 18px;
      color: #555;
      font-style: italic;
    }

    .typing-text {
      font-size: 20px;
      color: #333;
      height: 28px;
      margin-top: 25px;
      font-weight: bold;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background-color: #333;
      animation: blink 0.7s infinite;
      vertical-align: bottom;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .profile-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <div class="profile-top">
        <img src="your-photo.jpg" alt="نوح">
        <div class="profile-info">
          <h1>نوح</h1>
          <p>Mekatronik Mühendisi</p>
        </div>
      </div>
      <div class="typing-text" id="typing"></div>
    </div>
  </div>

  <script>
    const phrases = [
      "Embedded Systems Developer",
      "Robotics Enthusiast",
      "IoT Projects",
      "Automation & Control",
      "Technical Innovator"
    ];

    const typingElement = document.getElementById('typing');
    let phraseIndex = 0;
    let letterIndex = 0;
    let currentPhrase = '';
    let isDeleting = false;
    let speed = 100;

    function type() {
      const fullPhrase = phrases[phraseIndex];
      if (isDeleting) {
        currentPhrase = fullPhrase.substring(0, letterIndex--);
      } else {
        currentPhrase = fullPhrase.substring(0, letterIndex++);
      }
      typingElement.innerHTML = currentPhrase + '<span class="cursor"></span>';

      if (!isDeleting && letterIndex === fullPhrase.length + 1) {
        isDeleting = true;
        speed = 50;
        setTimeout(type, 1000);
      } else if (isDeleting && letterIndex === -1) {
        isDeleting = false;
        phraseIndex = (phraseIndex + 1) % phrases.length;
        speed = 100;
        setTimeout(type, 500);
      } else {
        setTimeout(type, speed);
      }
    }

    type();
  </script>
</body>
</html>
