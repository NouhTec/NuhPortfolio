<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نوح - Portfolio</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .profile {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #4a90e2;
    }

    .profile-info {
      text-align: left;
    }

    .profile-info h1 {
      margin: 0;
      font-size: 28px;
    }

    .profile-info p {
      margin: 5px 0 0;
      font-size: 16px;
      color: #555;
    }

    .typing-text {
      font-size: 18px;
      color: #333;
      margin-top: 20px;
      height: 24px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background-color: #333;
      animation: blink 0.7s infinite;
      vertical-align: bottom;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <img src="your-photo.jpg" alt="نوح">
      <div class="profile-info">
        <h1>نوح</h1>
        <p>Mekatronik Mühendisi</p>
      </div>
    </div>
    <div class="typing-text" id="typing"></div>
  </div>

  <script>
    const phrases = [
      "Embedded Systems Developer",
      "Robotics Enthusiast",
      "IoT Projects",
      "Automation & Control",
      "Technical Innovator"
    ];

    const typingElement = document.getElementById('typing');
    let phraseIndex = 0;
    let letterIndex = 0;
    let currentPhrase = '';
    let isDeleting = false;
    let speed = 100;

    function type() {
      const fullPhrase = phrases[phraseIndex];
      if (isDeleting) {
        currentPhrase = fullPhrase.substring(0, letterIndex--);
      } else {
        currentPhrase = fullPhrase.substring(0, letterIndex++);
      }
      typingElement.innerHTML = currentPhrase + '<span class="cursor"></span>';

      if (!isDeleting && letterIndex === fullPhrase.length + 1) {
        isDeleting = true;
        speed = 50;
        setTimeout(type, 1000);
      } else if (isDeleting && letterIndex === -1) {
        isDeleting = false;
        phraseIndex = (phraseIndex + 1) % phrases.length;
        speed = 100;
        setTimeout(type, 500);
      } else {
        setTimeout(type, speed);
      }
    }

    type();
  </script>
</body>
</html>
